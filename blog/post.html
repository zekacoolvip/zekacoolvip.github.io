    <script>
        const params = new URLSearchParams(window.location.search);
        const fileName = params.get('file');

        if (!fileName) {
            document.getElementById('post-content').innerHTML = `
                <div class="glass-card p-12 text-center">
                    <div class="text-5xl mb-4">❌</div>
                    <h2 class="text-2xl font-bold text-[#f85149] mb-3">No post specified</h2>
                    <p class="text-on-surface-variant mb-6">Please provide a valid article filename.</p>
                    <a href="/blog" class="inline-flex items-center gap-2 text-secondary hover:text-tertiary transition-colors">
                        <span class="material-symbols-outlined">arrow_back</span>
                        Back to Blog
                    </a>
                </div>
            `;
        } else {
            const repo = 'zekacoolvip/zekacoolvip.github.io';
            const path = `blog/posts/${fileName}`;

            fetch(`https://raw.githubusercontent.com/${repo}/main/${path}`)
                .then(res => {
                    if (!res.ok) throw new Error('Post not found');
                    return res.text();
                })
                .then(markdown => {
                    let title = fileName.replace('.md', '').replace(/-/g, ' ');
                    let content = markdown;
                    let date = '2026-07-11';

                    // Extract Frontmatter
                    const fmMatch = markdown.match(/---\n([\s\S]*?)\n---/);
                    if (fmMatch) {
                        const titleMatch = fmMatch[1].match(/title: (.*)/);
                        if (titleMatch) title = titleMatch[1];
                        const dateMatch = fmMatch[1].match(/date: (.*)/);
                        if (dateMatch) date = dateMatch[1];
                        content = markdown.replace(/---\n[\s\S]*?\n---/, '').trim();
                    }

                    // Convert Markdown to HTML
                    let html = content
                        .replace(/!\[([^\]]+)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
                        .replace(/^---$/gm, '<hr>')
                        .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                        .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                        .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\*(.*?)\*/g, '<em>$1</em>')
                        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
                        .replace(/`([^`]+)`/g, '<code>$1</code>')
                        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                        .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
                        .replace(/^- (.*$)/gm, '<li>$1</li>')
                        .replace(/\n\n/g, '</p><p>')
                        .replace(/\n/g, '<br>');

                    html = '<p>' + html + '</p>';

                    document.getElementById('post-content').innerHTML = `
                        <div class="glass-card p-8 md:p-12">
                            <div class="mb-8 pb-6 border-b border-white/10">
                                <h1 class="text-3xl md:text-4xl font-bold text-secondary magenta-glow">${title}</h1>
                                <div class="flex items-center gap-4 mt-4 text-sm text-on-surface-variant">
                                    <span>📅 ${date}</span>
                                    <span>•</span>
                                    <span>✍️ Zeko Studio</span>
                                    <span>•</span>
                                    <span>⏱️ 5 min read</span>
                                </div>
                            </div>
                            <div class="post-content">${html}</div>
                            <div class="mt-10 pt-6 border-t border-white/10">
                                <a href="/blog" class="inline-flex items-center gap-2 text-secondary hover:text-tertiary transition-colors">
                                    <span class="material-symbols-outlined">arrow_back</span>
                                    Back to Blog
                                </a>
                            </div>
                        </div>
                    `;
                })
                .catch(() => {
                    document.getElementById('post-content').innerHTML = `
                        <div class="glass-card p-12 text-center">
                            <div class="text-5xl mb-4">🔍</div>
                            <h2 class="text-2xl font-bold text-[#f85149] mb-3">Post not found</h2>
                            <p class="text-on-surface-variant mb-6">The article you're looking for doesn't exist or has been moved.</p>
                            <a href="/blog" class="inline-flex items-center gap-2 text-secondary hover:text-tertiary transition-colors">
                                <span class="material-symbols-outlined">arrow_back</span>
                                Back to Blog
                            </a>
                        </div>
                    `;
                });
        }
    </script>
