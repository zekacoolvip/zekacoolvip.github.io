<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Zeko Software Studio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        nav {
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: #00ff00;
        }
        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 20px;
        }
        nav a:hover { color: var(--accent-color); }

        header {
            text-align: center;
            padding: 60px 20px 40px;
        }
        header h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
        }
        header p {
            color: #8b949e;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .post-card:hover {
            border-color: var(--accent-color);
        }
        .post-card h2 {
            color: var(--accent-color);
            font-size: 1.3rem;
        }
        .post-card .date {
            color: #8b949e;
            font-size: 0.85rem;
        }
        .post-card a {
            display: inline-block;
            margin-top: 10px;
            color: #238636;
            text-decoration: none;
            font-weight: bold;
        }
        .post-card a:hover {
            color: #2ea043;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #8b949e;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #8b949e;
            border-top: 1px solid var(--border-color);
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ZEKO STUDIO</div>
        <div>
            <a href="/">Home</a>
            <a href="/blog">Blog</a>
        </div>
    </nav>

    <header>
        <h1>Resources</h1>
        <p>Articles about security, automation, and software development</p>
    </header>

    <div class="container">
        <div id="posts">
            <div class="loading">📖 Loading posts...</div>
        </div>
    </div>

    <footer>
        All Rights Reserved © Zeko Software Studio 2026
    </footer>

    <script>
        const repo = 'zekacoolvip/zekacoolvip.github.io';
        const path = 'blog/posts';

        fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
            .then(res => {
                if (!res.ok) throw new Error('No posts found');
                return res.json();
            })
            .then(files => {
                const container = document.getElementById('posts');
                container.innerHTML = '';

                const posts = files.filter(f => f.name.endsWith('.md'));

                if (posts.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center; padding:50px; color:#8b949e;">
                            📭 No posts yet. Coming soon!
                        </div>
                    `;
                    return;
                }

                posts.forEach(post => {
                    const link = document.createElement('div');
                    link.className = 'post-card';
                    link.innerHTML = `
                        <h2>${post.name.replace('.md', '').replace(/-/g, ' ')}</h2>
                        <div class="date">📅 2026-07-11</div>
                        <a href="post.html?file=${post.name}">📖 Read Article →</a>
                    `;
                    container.appendChild(link);
                });
            })
            .catch(() => {
                document.getElementById('posts').innerHTML = `
                    <div style="text-align:center; padding:50px; color:#8b949e;">
                        📭 No posts found. Create your first post!
                    </div>
                `;
            });
    </script>
</body>
</html>
