<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/zeko.png">
    <title>Tech Blog - Zeko Software Studio</title>
    <style>
        /* ===== ROOT ===== */
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --blue-light: #58a6ff;
            --border-color: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0d1117 0%, #1a3a5c 40%, #0d2b4a 70%, #0d1117 100%);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
        }

        /* ===== NAVBAR ===== */
        nav {
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: 0.3s;
        }
        nav a:hover { color: var(--blue-light); }

        /* ===== RGB ANIMATION ===== */
        .rgb {
            animation: rgbMove 2.5s linear infinite;
            font-weight: bold;
        }
        @keyframes rgbMove {
            0% { color: #00FF00; }
            50% { color: #00FFFF; }
            100% { color: #5865F2; }
        }

        /* ===== HEADER ===== */
        header {
            text-align: center;
            padding: 60px 20px 40px;
        }
        header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            text-shadow: none; /* حروف حادة ونظيفة */
            animation: rgbMove 3s linear infinite;
        }
        header p {
            color: #8b949e;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== POST CARDS ===== */
        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .post-card:hover {
            border-color: var(--blue-light);
            transform: translateY(-4px);
            box-shadow: 0 8px 35px rgba(88, 166, 255, 0.15);
        }

        .post-card .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .post-card .post-header h2 {
            color: var(--blue-light);
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }
        .post-card .post-header .date {
            color: #8b949e;
            font-size: 0.85rem;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .post-card .post-excerpt {
            color: #8b949e;
            font-size: 1rem;
            line-height: 1.7;
            margin: 5px 0;
        }

        .post-card .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }
        .post-card .post-footer .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .post-card .post-footer .tags span {
            background: rgba(88, 166, 255, 0.1);
            color: var(--blue-light);
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }
        .post-card .post-footer a {
            color: #238636;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .post-card .post-footer a:hover {
            color: #2ea043;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 50px;
            color: #8b949e;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #8b949e;
            border-top: 1px solid var(--border-color);
            margin-top: 60px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .post-card .post-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .post-card .post-footer {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P5VK0GGKC6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P5VK0GGKC6');
    </script>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav>
        <a href="/">Home</a>
        <a href="/blog" class="rgb">Blog</a>
    </nav>

    <!-- ===== HEADER ===== -->
    <header>
        <h1>Tech Blog</h1>
        <p>Security, Automation &amp; Software Development</p>
    </header>

    <!-- ===== POSTS ===== -->
    <div class="container">
        <div id="posts">
            <div class="loading">Loading posts...</div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
        All Rights Reserved &copy; <a href="/" style="color:#58a6ff; text-decoration:none;">Zeko Software Studio</a> 2026
    </footer>

    <script>
        const repo = 'zekacoolvip/zekacoolvip.github.io';
        const path = 'blog/posts';

        fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
            .then(res => {
                if (!res.ok) throw new Error('No posts');
                return res.json();
            })
            .then(files => {
                const container = document.getElementById('posts');
                container.innerHTML = '';

                const posts = files.filter(f => f.name.endsWith('.md'));

                if (posts.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center; padding:50px; color:#8b949e;">
                            📭 No posts yet. Coming soon!
                        </div>
                    `;
                    return;
                }

                posts.forEach(post => {
                    const title = post.name.replace('.md', '').replace(/-/g, ' ');
                    const fileName = post.name;

                    fetch(post.download_url)
                        .then(res => res.text())
                        .then(content => {
                            let tags = [];
                            const tagMatch = content.match(/tags: \[(.*)\]/);
                            if (tagMatch) {
                                tags = tagMatch[1].split(',').map(t => t.trim());
                            }

                            const card = document.createElement('div');
                            card.className = 'post-card';
                            card.innerHTML = `
                                <div class="post-header">
                                    <h2>${title}</h2>
                                    <span class="date">📅 2026-07-12</span>
                                </div>
                                <div class="post-excerpt">
                                    ${title} - Read the full article to learn more about ${title}.
                                </div>
                                <div class="post-footer">
                                    <div class="tags">
                                        ${tags.map(t => `<span>#${t}</span>`).join('')}
                                    </div>
                                    <a href="post.html?file=${fileName}">📖 Read Article →</a>
                                </div>
                            `;
                            container.appendChild(card);
                        });
                });
            })
            .catch(() => {
                document.getElementById('posts').innerHTML = `
                    <div style="text-align:center; padding:50px; color:#8b949e;">
                        📭 No posts found.
                    </div>
                `;
            });
    </script>
</body>
</html>
