<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Resources - Zeko Software Studio</title>
    <meta name="description" content="Read articles about security, automation, software development, and free tools.">
    
    <!-- ===== OPEN GRAPH ===== -->
    <meta property="og:title" content="Tech Blog - Zeko Software Studio">
    <meta property="og:description" content="Articles about security, automation, and software development.">
    <meta property="og:image" content="https://zekacoolvip.github.io/blog-banner.png">
    <meta property="og:url" content="https://zekacoolvip.github.io/blog/">
    <meta property="og:type" content="website">
    
    <!-- ===== TWITTER ===== -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tech Blog - Zeko Software Studio">
    <meta name="twitter:description" content="Articles about security, automation, and software development.">
    <meta name="twitter:image" content="https://zekacoolvip.github.io/blog-banner.png">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --blue-light: #58a6ff;
            --border-color: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0d1117 0%, #1a3a5c 40%, #0d2b4a 70%, #0d1117 100%);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        nav {
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: 0.3s;
        }
        nav a:hover { color: var(--blue-light); }

        .rgb {
            animation: rgbMove 2.5s linear infinite;
            font-weight: bold;
        }
        @keyframes rgbMove {
            0% { color: #ff0000; }
            17% { color: #ff8800; }
            33% { color: #ffff00; }
            50% { color: #00ff00; }
            67% { color: #0088ff; }
            83% { color: #8800ff; }
            100% { color: #ff0000; }
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
        }
        header h1 {
            font-size: 2.8rem;
            animation: rgbMove 3s linear infinite;
        }
        header p {
            color: #8b949e;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            transition: 0.3s;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .post-card:hover {
            border-color: var(--blue-light);
            transform: translateY(-3px);
        }

        .post-card .post-image {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: #1a2332;
            border: 1px solid var(--border-color);
        }
        .post-card .post-content {
            flex: 1;
        }
        .post-card h2 {
            color: var(--blue-light);
            font-size: 1.3rem;
        }
        .post-card .date {
            color: #8b949e;
            font-size: 0.85rem;
        }
        .post-card .excerpt {
            color: #8b949e;
            font-size: 0.95rem;
            margin: 8px 0;
            line-height: 1.6;
        }
        .post-card a {
            display: inline-block;
            color: #238636;
            text-decoration: none;
            font-weight: bold;
        }
        .post-card a:hover {
            color: #2ea043;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #8b949e;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #8b949e;
            border-top: 1px solid var(--border-color);
            margin-top: 60px;
        }

        @media (max-width: 600px) {
            .post-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .post-card .post-image {
                width: 100%;
                height: 150px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/blog" class="rgb">Blog</a>
    </nav>

    <header>
        <h1>Resources</h1>
        <p>Security, Automation &amp; Software Development</p>
    </header>

    <div class="container">
        <div id="posts">
            <div class="loading">📖 Loading posts...</div>
        </div>
    </div>

    <footer>
        All Rights Reserved &copy; <a href="/" style="color:#58a6ff; text-decoration:none;">Zeko Software Studio</a> 2026
    </footer>

    <script>
        const repo = 'zekacoolvip/zekacoolvip.github.io';
        const path = 'blog/posts';

        fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
            .then(res => {
                if (!res.ok) throw new Error('No posts');
                return res.json();
            })
            .then(files => {
                const container = document.getElementById('posts');
                container.innerHTML = '';

                const posts = files.filter(f => f.name.endsWith('.md'));

                if (posts.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center; padding:50px; color:#8b949e;">
                            📭 No posts yet. Coming soon!
                        </div>
                    `;
                    return;
                }

                posts.forEach(post => {
                    const title = post.name.replace('.md', '').replace(/-/g, ' ');
                    const excerpt = 'Read more about ' + title + '...';
                    
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <img src="/blog-banner.png" alt="${title}" class="post-image" onerror="this.style.display='none'">
                        <div class="post-content">
                            <h2>${title}</h2>
                            <div class="date">📅 2026-07-11</div>
                            <div class="excerpt">${excerpt}</div>
                            <a href="post.html?file=${post.name}">📖 Read Article →</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(() => {
                document.getElementById('posts').innerHTML = `
                    <div style="text-align:center; padding:50px; color:#8b949e;">
                        📭 No posts found.
                    </div>
                `;
            });
    </script>
</body>
</html>
