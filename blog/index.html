<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقالات - Zeko Software Studio</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 50px 20px;
            border-bottom: 1px solid #30363d;
        }
        header h1 {
            color: #58a6ff;
            font-size: 2.5rem;
        }
        header p {
            color: #8b949e;
            font-size: 1.2rem;
        }
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 30px 0;
        }
        .blog-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            transition: 0.3s;
        }
        .blog-card:hover {
            border-color: #238636;
            transform: translateY(-5px);
        }
        .blog-card h3 {
            color: #58a6ff;
            margin: 0 0 10px;
        }
        .blog-card .date {
            color: #8b949e;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 15px;
        }
        .blog-card a {
            color: #238636;
            text-decoration: none;
            font-weight: bold;
        }
        .blog-card a:hover {
            color: #2ea043;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #8b949e;
        }
        .btn-back {
            display: inline-block;
            background: #21262d;
            color: #c9d1d9;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            margin: 10px 0;
            border: 1px solid #30363d;
        }
        .btn-back:hover {
            background: #30363d;
        }
        nav {
            padding: 15px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            gap: 20px;
        }
        nav a {
            color: #c9d1d9;
            text-decoration: none;
        }
        nav a:hover {
            color: #58a6ff;
        }
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #8b949e;
            border-top: 1px solid #30363d;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">🏠 الرئيسية</a>
        <a href="/blog">📝 المقالات</a>
    </nav>

    <header>
        <h1>📝 مقالات تقنية</h1>
        <p>نصائح، شروحات، وأدوات لحماية جهازك وزيادة إنتاجيتك</p>
    </header>

    <div class="container">
        <div class="blog-grid" id="blog-posts">
            <div class="loading">📖 جاري تحميل المقالات...</div>
        </div>
    </div>

    <footer>
        جميع الحقوق محفوظة © Zeko Software Studio 2026
    </footer>

    <script>
        // 1. نجيب المقالات من GitHub
        const repo = 'zekacoolvip/zekacoolvip.github.io';
        const path = 'blog/posts';
        
        fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
            .then(response => {
                if (!response.ok) throw new Error('مشكلة في التحميل');
                return response.json();
            })
            .then(files => {
                const container = document.getElementById('blog-posts');
                container.innerHTML = '';
                
                const posts = files.filter(f => f.name.endsWith('.md'));
                
                if (posts.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center; padding:50px; color:#8b949e;">
                            📭 مفيش مقالات حالياً... قريباً ✨
                        </div>
                    `;
                    return;
                }
                
                // عكس الترتيب عشان الأحدث أولاً
                posts.reverse();
                
                posts.forEach(post => {
                    fetch(post.download_url)
                        .then(res => res.text())
                        .then(content => {
                            // استخراج العنوان
                            const titleMatch = content.match(/title: (.*)/);
                            const title = titleMatch ? titleMatch[1] : post.name.replace('.md', '');
                            
                            // استخراج التاريخ
                            const dateMatch = content.match(/date: (.*)/);
                            const date = dateMatch ? dateMatch[1] : '';
                            
                            // استخراج أول 100 حرف كمقدمة
                            const cleanContent = content.replace(/---.*?---/s, '').trim();
                            const preview = cleanContent.substring(0, 150) + '...';
                            
                            const card = document.createElement('div');
                            card.className = 'blog-card';
                            card.innerHTML = `
                                <h3>📄 ${title}</h3>
                                ${date ? `<span class="date">📅 ${date}</span>` : ''}
                                <p style="color:#8b949e; font-size:0.9rem; line-height:1.6;">${preview}</p>
                                <a href="post.html?file=${post.name}">📖 اقرأ المقال</a>
                            `;
                            container.appendChild(card);
                        });
                });
            })
            .catch(error => {
                document.getElementById('blog-posts').innerHTML = `
                    <div style="text-align:center; padding:50px; color:#f85149;">
                        ❌ حدث خطأ في تحميل المقالات
                        <br><small style="color:#8b949e;">تأكد من وجود مجلد blog/posts</small>
                    </div>
                `;
            });
    </script>
</body>
</html>
